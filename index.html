<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIDH</title>

<link rel="icon" type="image/png" href="icon.png">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

body{
font-family:'Inter',sans-serif;
background:#000;
color:#fff;
display:flex;
}

/* SIDEBAR */

.sidebar{
position:fixed;
left:20px;
top:50%;
transform:translateY(-50%);
width:300px;
background:transparent;
padding:0;
}

.profile-card{
position:relative;
width:100%;
}

.profile{
width:100%;
height:auto;
display:block;
border-radius:20px;
}

.profile-overlay{
    position:absolute;
    left:38px;
    bottom:18px;
    display:flex;
    flex-direction:column;
    gap:4px;
}

.profile-overlay a{
    text-decoration:none;
    color:#c93a3a;
    font-size:20px;
    font-weight:800;
    text-transform:uppercase;
    text-shadow:none;
    font-family:serif;
}

.profile-overlay a:hover{
opacity:.8;
}

/* MAIN */

.main{
margin-left:420px;
width:100%;
padding:60px;
}

.section-title{
font-size:80px;
font-weight:800;
margin-bottom:50px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;
}

.card{
position:relative;
overflow:hidden;
border-radius:14px;
height:420px;
cursor:pointer;
}

.card-link{
display:block;
text-decoration:none;
color:inherit;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
transition:.4s;
}

.card:hover img{
transform:scale(1.05);
}

.overlay{
position:absolute;
bottom:0;
left:0;
right:0;
padding:25px;
background:linear-gradient(
transparent,
rgba(0,0,0,.9)
);
}

.category{
font-size:12px;
letter-spacing:2px;
color:#ccc;
}

.project{
font-size:28px;
font-weight:700;
margin-top:8px;
}

/* CONTACT */

.contact{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
}

.contact h2{
font-size:80px;
margin-bottom:20px;
}

.contact p{
font-size:22px;
color:#aaa;
margin-bottom:25px;
}

.contact-info{
display:flex;
flex-direction:column;
gap:18px;
font-size:22px;
}

.contact-info a{
color:white;
text-decoration:none;
}

.contact-info a:hover{
opacity:0.8;
}

.badge{
margin-top:40px;
padding:15px 30px;
border:1px solid #333;
border-radius:50px;
}

/* MOBILE */

@media(max-width:900px){

body{
display:block;
}

.sidebar{
position:relative;
left:auto;
top:auto;
transform:none;
width:90%;
margin:20px auto;
}

.main{
margin-left:0;
padding:20px;
}

.section-title{
font-size:50px;
}

.contact h2{
font-size:50px;
}

}

</style>
</head>
